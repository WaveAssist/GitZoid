name: Gitzoid
description: AI-powered GitHub bot that monitors pull requests, generates structured reviews, and posts them back. Automatically detects new commits and provides incremental reviews.
success_message: Gitzoid is setup and running. It will auto review all your new pull requests and follow-up commits within a few minutes.
output_default_message: "Run completed, no new pull requests to review. \n<br> Gitzoid will automatically review all your new pull requests and incremental changes."

requirements:
  - openai

nodes:
  # Single DAG, single starting node (house pattern, like GitDigest/WaveContent). The cheap
  # credit+init gate runs FIRST — before the expensive brain build — then the brain, then the
  # review pipeline. So credits are checked once up front, the progress bar shows from second 0,
  # the review always sees a fresh per-repo profile (no brainless first review), and there is one
  # run in View Runs. study_repos self-throttles: it rebuilds the profile only every ~14 days and
  # is a cheap no-op (no GitHub/LLM calls) on the other 2-min cycles.
  - key: check_credits_and_init
    name: CheckCreditsAndInit
    file_name: check_credits_and_init.py
    starting_node: true
    schedule:
      interval:
        every: 2
        period: minutes

  - key: study_repos
    name: StudyRepos
    file_name: study_repos.py
    run_after:
      - check_credits_and_init

  - key: fetch_pull_requests
    name: FetchPRs
    file_name: fetch_pull_requests.py
    run_after:
      - study_repos

  - key: generate_review
    name: GenerateReview
    file_name: generate_review.py
    run_after:
      - fetch_pull_requests

  - key: post_comment
    name: PostComment
    file_name: post_comment.py
    run_after:
      - generate_review

  # ---- Security Watch chain (Phase B) ----
  # A SEPARATE disconnected subgraph with its OWN daily clock, so the (slow, weekly) deep audit never
  # holds the 2-min review lock. One starting node per connected subgraph — the review chain above and
  # this security chain are independent, which the platform supports. deep_security_audit self-throttles
  # to weekly per repo; triage_and_alert is the single gate + alert path and releases security_run_lock.
  - key: security_check_and_init
    name: SecurityCheckAndInit
    file_name: security_check_and_init.py
    starting_node: true
    schedule:
      cron: "0 6 * * *"   # daily at 06:00 UTC
      timezone: "UTC"

  - key: scan_dependencies
    name: ScanDependencies
    file_name: scan_dependencies.py
    run_after:
      - security_check_and_init

  - key: deep_security_audit
    name: DeepSecurityAudit
    file_name: deep_security_audit.py
    run_after:
      - scan_dependencies

  - key: triage_and_alert
    name: TriageAndAlert
    file_name: triage_and_alert.py
    run_after:
      - deep_security_audit

variables:
  - type: github
    name: github
    display_name: GitHub
    key: github
    is_optional: false
    scopes: ["repo"]
    required_resources: ["repos"]
    helper_message: "Connect your GitHub account to the app"
    display_type: "base"

  # Single global model for ALL repos (not per-repo). Code reads `model_name` via fetch_data and
  # falls back to the default if unset.
  - name: model_name
    key: model_name
    display_name: Model
    type: select
    is_optional: true
    default_value: "anthropic/claude-sonnet-4.6"
    helper_message: "The AI model GitZoid uses to review every pull request"
    options:
      - name: Claude Sonnet 4.6
        key: anthropic/claude-sonnet-4.6
      - name: Claude Haiku 4.5
        key: anthropic/claude-haiku-4.5
      - name: Claude Opus 4.6
        key: anthropic/claude-opus-4.6
      - name: Grok Code Fast 1
        key: x-ai/grok-code-fast-1
      - name: Gemini 3 Flash
        key: google/gemini-3-flash-preview
      - name: DeepSeek V3.2
        key: deepseek/deepseek-v3.2
      - name: Gemini 3.1 Pro
        key: google/gemini-3.1-pro-preview
      - name: GPT-5.2
        key: openai/gpt-5.2
      - name: Minimax M2.5
        key: minimax/minimax-m2.5

  # Security Watch toggle. Default ON (existing + new users). Turning it off skips the whole security
  # chain cleanly (no failed runs). The daily scan is silent unless it finds something real.
  - name: enable_security
    key: enable_security
    display_name: Security Watch
    type: select
    is_optional: true
    default_value: "true"
    helper_message: "Daily dependency & supply-chain watch plus a weekly deep code audit. Silent unless it finds a real, exploitable issue."
    options:
      - name: "On"
        key: "true"
      - name: "Off"
        key: "false"

  - name: schedule
    key: schedule
    display_name: Review frequency
    value:
      cron: "*/2 * * * *"
      timezone: "UTC"
    type: "schedule"
    is_optional: true
    helper_message: "How often GitZoid should check and review your pull requests"
    options:
      - name: Quick (every 2 minutes)
        key:
          cron: "*/2 * * * *"
          timezone: "UTC"
      - name: Relaxed (every 5 minutes)
        key:
          cron: "*/5 * * * *"
          timezone: "UTC"
      - name: Webhook only (trigger based, with 30 mins fallback)
        key:
          cron: "*/30 * * * *"
          timezone: "UTC"
