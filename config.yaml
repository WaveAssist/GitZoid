name: Gitzoid
description: AI-powered GitHub bot that monitors pull requests, generates structured reviews, and posts them back. Automatically detects new commits and provides incremental reviews.
success_message: Gitzoid is setup and running. It will auto review all your new pull requests and follow-up commits within a few minutes.
output_default_message: "Run completed, no new pull requests to review. \n<br> Gitzoid will automatically review all your new pull requests and incremental changes."

requirements:
  - openai

# The "brain": study_repos builds a durable per-repo profile (additive key profile:{owner/repo}),
# rendered to brain_html for a Knowledge tab. Refresh re-runs build_node; delete clears profile keys.
brain:
  enabled: true
  html_key: brain_html
  build_node: study_repos
  profile_key_prefix: "profile:"
  refresh_interval_days: 14

nodes:
  - key: fetch_pull_requests
    name: FetchPRs
    file_name: fetch_pull_requests.py
    starting_node: true
    schedule:
      interval:
        every: 2
        period: minutes

  - key: generate_review
    name: GenerateReview
    file_name: generate_review.py
    run_after:
      - fetch_pull_requests

  - key: post_comment
    name: PostComment
    file_name: post_comment.py
    run_after:
      - generate_review

  # Independent starting node with its own weekly schedule. Builds/refreshes the per-repo brain,
  # decoupled from the 2-min review loop; downstream nodes read profiles with safe defaults.
  - key: study_repos
    name: StudyRepos
    file_name: study_repos.py
    starting_node: true
    schedule:
      cron: "0 3 * * 1"

variables:
  - type: github
    name: github
    display_name: GitHub
    key: github
    is_optional: false
    scopes: ["repo"]
    required_resources: ["repos"]
    helper_message: "Connect your GitHub account to the app"
    display_type: "base"
    resource_properties:
      - key: model_name
        display_name: Model
        type: select
        is_optional: false
        default_value: "anthropic/claude-sonnet-4.6"
        options:
          - name: Claude Haiku 4.5
            key: anthropic/claude-haiku-4.5
          - name: Claude Sonnet 4.6
            key: anthropic/claude-sonnet-4.6
          - name: Claude Opus 4.6
            key: anthropic/claude-opus-4.6
          - name: Grok Code Fast 1
            key: x-ai/grok-code-fast-1
          - name: Gemini 3 Flash
            key: google/gemini-3-flash-preview
          - name: DeepSeek V3.2
            key: deepseek/deepseek-v3.2
          - name: Gemini 3.1 Pro
            key: google/gemini-3.1-pro-preview
          - name: GPT-5.2
            key: openai/gpt-5.2
          - name: Minimax M2.5
            key: minimax/minimax-m2.5
      - key: additional_context
        display_name: Context
        type: text
        is_optional: true
        default_value: ""
        helper_message: "Review context specific to this repo"
      - key: branch
        display_name: Branch to study
        type: text
        is_optional: true
        default_value: ""
        helper_message: "Branch the brain profiles (defaults to the repo's default branch)"
      - key: severity_threshold
        display_name: Review strictness
        type: select
        is_optional: true
        default_value: "high"
        options:
          - name: High signal only (recommended)
            key: high
          - name: Balanced
            key: medium
        helper_message: "Only post review findings at or above this confidence/severity"

  - name: schedule
    key: schedule
    display_name: Review frequency
    value:
      cron: "*/2 * * * *"
      timezone: "UTC"
    type: "schedule"
    is_optional: true
    helper_message: "How often GitZoid should check and review your pull requests"
    options:
      - name: Quick (every 2 minutes)
        key:
          cron: "*/2 * * * *"
          timezone: "UTC"
      - name: Relaxed (every 5 minutes)
        key:
          cron: "*/5 * * * *"
          timezone: "UTC"
      - name: Webhook only (trigger based, with 30 mins fallback)
        key:
          cron: "*/30 * * * *"
          timezone: "UTC"
